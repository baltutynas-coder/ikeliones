<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puslapis nerastas – Virtualios kelionės Šiauliuose</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; color: #3a3a3a; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
    .error-page { max-width: 500px; }
    .error-page h1 { font-size: 6rem; font-weight: 900; color: #f5b731; line-height: 1; }
    .error-page h2 { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin: 15px 0; }
    .error-page p { color: #999; font-size: 0.9rem; line-height: 1.7; margin-bottom: 30px; }
    .error-page a { display: inline-block; padding: 12px 35px; background: #f5b731; color: #fff; border-radius: 5px; font-weight: 700; font-size: 0.85rem; text-decoration: none; transition: background 0.3s; }
    .error-page a:hover { background: #e0a520; }
    .error-page img { height: 50px; margin: 0 auto 25px; }
  </style>
</head>
<body>
  <div class="error-page">
    <img src="img/logo.png" alt="ikelionės">
    <h1>404</h1>
    <h2>Puslapis nerastas</h2>
    <p>Atsiprašome, bet puslapis, kurio ieškote, neegzistuoja arba buvo perkeltas. Grįžkite į pagrindinį puslapį ir tęskite kelionę!</p>
    <a href="index.html">Grįžti į pradžią</a>
  </div>
</body>
</html>
